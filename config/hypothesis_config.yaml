# v3 ACH Hypothesis Configuration — Multi-Nation US-Alignment Assessment
# Each nation has three fixed hypotheses on the supports ↔ opposes United States axis.
# Add or remove nations freely; each gets its own isolated ACH matrix.

nations:
  china:
    search_query: "China United States relations"
    hypotheses:
      - id: "h1"
        name: "China supports the United States"
        description: |
          Evidence suggests China is aligned with or supportive of US interests,
          policy positions, or strategic objectives.
      - id: "h2"
        name: "China maintains a neutral stance with the United States"
        description: |
          Evidence suggests China is neither clearly aligned with nor opposed to
          US interests, pursuing an independent or balanced posture.
      - id: "h3"
        name: "China opposes the United States"
        description: |
          Evidence suggests China is acting against US interests, countering US
          policy, or aligning with adversaries of the United States.

